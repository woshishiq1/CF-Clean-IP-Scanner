name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 2.2.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: choice
        options:
          - 'false'
          - 'true'
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Get Go dependencies
        run: |
          go mod download
          go mod tidy

      - name: Build cf-scanner for Android ARM64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o cf-scanner

      - name: Verify Go build
        run: |
          file cf-scanner
          ls -lh cf-scanner

      - name: Download Xray core latest stable (Android ARM64-v8a)
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest | grep -o '"tag_name": "[^"]*' | cut -d '"' -f 4)
          if [ -z "$LATEST_TAG" ]; then
            echo "Failed to get latest Xray tag"
            exit 1
          fi
          DOWNLOAD_URL="https://github.com/XTLS/Xray-core/releases/download/${LATEST_TAG}/Xray-android-arm64-v8a.zip"
          echo "Downloading Xray from $DOWNLOAD_URL"
          curl -L -o xray-core.zip "$DOWNLOAD_URL"
          if [ ! -f xray-core.zip ]; then
            echo "Failed to download Xray"
            exit 1
          fi
          unzip -o xray-core.zip -d xray_temp
          mkdir -p xray
          cp xray_temp/xray xray/
          chmod +x xray/xray
          rm -rf xray_temp xray-core.zip
          echo "Xray binary ready at ./xray/xray"

      - name: Prepare config directory and sample configs
        run: |
          mkdir -p config
          cat > config/xray_config.json << 'EOF'
          {
            "log": { "loglevel": "warning" },
            "inbounds": [
              {
                "port": 1080,
                "protocol": "socks",
                "settings": { "udp": false },
                "listen": "127.0.0.1"
              }
            ],
            "outbounds": [
              {
                "protocol": "vless",
                "settings": {
                  "vnext": [
                    {
                      "address": "IP_PLACEHOLDER",
                      "port": 443,
                      "users": [
                        { "id": "your-uuid-here", "encryption": "none", "flow": "xtls-rprx-vision" }
                      ]
                    }
                  ]
                },
                "streamSettings": {
                  "network": "tcp",
                  "security": "tls",
                  "tlsSettings": {
                    "serverName": "your-domain.com",
                    "allowInsecure": false
                  }
                }
              }
            ]
          }
          EOF
          cat > config/xray_config.txt << 'EOF'
          # Xray URL Config
          # Put your proxy URL on the line below (remove the # at the start).
          # Supported formats: vless://, vmess://, trojan://, ss://
          # Example:
          # vless://your-uuid@your-server.com:443?type=ws&security=tls&host=your-server.com&path=%2F&sni=your-server.com#MyConfig
          #
          # If this file has a valid URL, it will be used instead of xray_config.json.
          EOF
          echo "Sample configs created"

      - name: Create full zip package with Xray included
        run: |
          ZIP_NAME="cf-scanner-arm64-v${{ github.event.inputs.version }}.zip"
          zip -r "$ZIP_NAME" cf-scanner xray/ config/
          echo "Created $ZIP_NAME"
          ls -lh "$ZIP_NAME"

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: cf-scanner-arm64-v${{ github.event.inputs.version }}.zip
          body: |
            ## CF Clean IP Scanner v${{ github.event.inputs.version }}
            
            **Cloudflare Clean IP Scanner for Termux (Android ARM64)**
            
            ### Installation (Direct Download)
            
            ```
            pkg update && pkg upgrade && pkg install wget unzip
            wget https://github.com/${{ github.repository }}/releases/download/v${{ github.event.inputs.version }}/cf-scanner-arm64-v${{ github.event.inputs.version }}.zip
            unzip cf-scanner-arm64-v${{ github.event.inputs.version }}.zip
            chmod +x cf-scanner
            ./cf-scanner
            ```
            
            ### Installation (Build from Source with Xray)
            
            ```
            curl -sL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```
            
            ### Usage
            
            ```
            cf-scanner
            ```
            
            Then choose: 1 for normal scan, 2 for Xray scan.
            
            Press Ctrl+C to stop and see results.
            
            ### Xray Mode Configuration
            
            Edit **one** of these files with your config:
            - **URL format** → `config/xray_config.txt` (paste your vless:// / vmess:// / trojan:// / ss:// link)
            - **JSON format** → `config/xray_config.json` (paste your full Xray JSON config)
            
            ---
            Made with love for Iranian users